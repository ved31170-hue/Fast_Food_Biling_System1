{% extends "base.html" %}

{% block content %}

<h2>📦 Orders</h2>

<table class="table table-dark">
<tr>
<th>ID</th>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for o in orders %}
<tr>
<td>{{o[0]}}</td>
<td>{{o[1]}}</td>
<td>{{o[2]}}</td>
<td>₹{{o[3]}}</td>
<td>{{o[4]}}</td>

<td>
<a href="/complete/{{o[0]}}" class="btn btn-success btn-sm">
Done
</a>
</td>
</tr>
{% endfor %}
</table>

{% endblock %}
