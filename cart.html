{% extends "base.html" %}

{% block content %}

<h2>🛒 Cart</h2>

<table class="table table-dark">
<tr>
<th>Item</th>
<th>Qty</th>
<th>Total</th>
</tr>

{% for i in cart %}
<tr>
<td>{{i.name}}</td>
<td>{{i.qty}}</td>
<td>₹{{i.total}}</td>
</tr>
{% endfor %}
</table>

<h4>Total: ₹{{total}}</h4>

<a href="/bill" class="btn btn-success">Generate Bill</a>

{% endblock %}
