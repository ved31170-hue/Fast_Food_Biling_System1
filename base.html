<!DOCTYPE html>
<html>
<head>
<title>Food App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8fafc;   /* light background */
    color: #111;           /* dark text */
    font-family: 'Segoe UI';
}

.navbar {
    background: #0f172a;
}

.navbar a {
    color: white !important;
}

.card {
    background: white;
    color: black;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.btn-gold {
    background: #facc15;
    border: none;
    color: black;
}

.table {
    background: white;
    color: black;
}

h2, h3, h4, h5 {
    color: #111;
}
</style>

</head>
<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand">🍔 Food App</span>

    <div>
        <a href="/" class="btn btn-outline-light btn-sm">Menu</a>
        <a href="/cart" class="btn btn-outline-light btn-sm">Cart</a>
        <a href="/orders" class="btn btn-outline-light btn-sm">Orders</a>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

</body>
</html>
